services:
  backend:
    build: ./backend
    container_name: awg-admin-backend
    env_file: .env
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-8090}:8090"
    restart: unless-stopped
  frontend:
    build: ./frontend
    container_name: awg-admin-frontend
    ports:
      - "${PANEL_HTTP_BIND:-0.0.0.0}:${PANEL_HTTP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
  qr-renderer:
    build: ./qr-renderer
    container_name: awg-admin-qr-renderer
    restart: unless-stopped
  awg:
    image: ${AWG_IMAGE:-amneziawg-server}
    container_name: ${AWG_CONTAINER_NAME:-awg-panel-awg}
    env_file: .env
    profiles:
      - server
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ${AWG_HOST_CONFIG_DIR:-./data/amneziawg}:/opt/amnezia/awg
    restart: unless-stopped
